worker_processes auto;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 500M;
    sendfile on;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    upstream nextjs_web {
        server web:3000;
    }

    upstream fastapi_api {
        server api:8000;
    }

    upstream minio_storage {
        server minio:9000;
    }

    # ── Redirect all HTTP → HTTPS ─────────────────────────────────────────────
    server {
        listen 80;
        server_name face-ai.prajwall.online;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name face-ai.prajwall.online;

        ssl_certificate     /etc/letsencrypt/live/face-ai.prajwall.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/face-ai.prajwall.online/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── FastAPI Backend ───────────────────────────────────────────────────
        location /api/v1/ {
            proxy_pass http://fastapi_api;
        }

        # ── MinIO Storage ─────────────────────────────────────────────────────
        location /face-ai-raw/ {
            proxy_pass http://minio_storage;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_request_buffering off;
        }

        # ── Next.js Frontend ──────────────────────────────────────────────────
        location / {
            proxy_pass http://nextjs_web;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }
    }
}
