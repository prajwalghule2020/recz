worker_processes auto;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 500M;
    sendfile on;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    # Use Docker's internal DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=2s ipv6=off;
    resolver_timeout 2s;

    upstream nextjs_web {
        server web:3000;
    }

    upstream minio_storage {
        server minio:9000;
    }

    # ── Redirect all HTTP → HTTPS ─────────────────────────────────────────────
    server {
        listen 80;
        server_name face-ai.prajwall.online;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name face-ai.prajwall.online;

        ssl_certificate     /etc/letsencrypt/live/face-ai.prajwall.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/face-ai.prajwall.online/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── FastAPI Backend (dynamic resolution) ─────────────────────────────
        location /api/v1/ {
            set $api_host api;
            proxy_pass http://$api_host:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            # Retry transient upstream failures (including POST uploads) when
            # API container is briefly recreated and old IP sockets refuse.
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 15s;
        }

        # ── MinIO Storage ─────────────────────────────────────────────────────
        location /face-ai-raw/ {
            proxy_pass http://minio_storage;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_request_buffering off;
        }

        # ── Next.js Frontend ──────────────────────────────────────────────────
        location / {
            proxy_pass http://nextjs_web;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }
    }
}
