worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Increase max body size for photo/video uploads
    client_max_body_size 500M;
    sendfile on;

    # Long timeouts for large AI processing jobs
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    # Upstream definitions — these match docker-compose.prod.yml service names
    upstream nextjs_web {
        server web:3000;
    }

    upstream fastapi_api {
        server api:8000;
    }

    upstream minio_storage {
        server minio:9000;
    }

    server {
        listen 80;
        server_name prajwall.online face-ai.prajwall.online www.prajwall.online;

        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── 1. FastAPI Backend ──────────────────────────────────────────────
        location /api/v1/ {
            proxy_pass http://fastapi_api;
        }

        # ── 2. MinIO Object Storage (bucket: face-ai-raw) ───────────────────
        location /face-ai-raw/ {
            proxy_pass http://minio_storage;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_request_buffering off;
        }

        # ── 3. Next.js Frontend (Default) ───────────────────────────────────
        location / {
            proxy_pass http://nextjs_web;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }
    }
}
