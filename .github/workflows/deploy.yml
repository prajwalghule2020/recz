name: Build, Push & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout Code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Login to Docker Hub ───────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Step 3: Set up Docker Buildx (for faster builds) ──────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 4: Build & Push Next.js Web App ─────────────────────────────
      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile.prod
          push: true
          tags: prajwalghule20/face-ai-web:latest
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 5: Build & Push FastAPI ──────────────────────────────────────
      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: prajwalghule20/face-ai-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 6: Build & Push Celery Worker ───────────────────────────────
      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: prajwalghule20/face-ai-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 7: Build & Push Migrate image ────────────────────────────────
      # This is a tiny image containing only the Prisma schema + migrations
      # Used to run `prisma migrate deploy` on the VM during each deployment
      - name: Build and push migrate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile.migrate
          push: true
          tags: prajwalghule20/face-ai-migrate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 8: Copy deployment files to VM via SCP ───────────────────────
      - name: Copy docker-compose and nginx config to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: "~/face-ai/"

      # ── Step 9: SSH into VM & Deploy ──────────────────────────────────────
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            cd ~/face-ai

            # Login to Docker Hub on the VM
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Pull the latest images
            docker compose -f docker-compose.prod.yml pull

            # ── Run DB Migrations BEFORE starting services ─────────────────
            # Ensure postgres is running first
            docker compose -f docker-compose.prod.yml up -d postgres
            sleep 5

            # Run migrations using the dedicated migrate image
            source .env
            docker run --rm \
              --network face-ai_default \
              -e DATABASE_URL="$DATABASE_URL" \
              prajwalghule20/face-ai-migrate:latest

            # ── Start all services ──────────────────────────────────────────
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old unused images to save disk space
            docker image prune -f
